name: CI

# Test + build gate. Runs the same checks as the local pre-merge gate
# (npm test && npm run build) so they are enforced by GitHub, not just locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Mirror the local gate order (`npm test && npm run build`). The test suite is
      # build-independent — the secure-header test asserts on /api/health, not the SPA
      # fallback — so test runs first and build follows.
      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # Estate-wide shell standard (see ~/.claude/CLAUDE.md): shellcheck for correctness,
  # shfmt -i 2 -ci for format. Both belong in CI. Runs independently of the test gate.
  shell-lint:
    name: shell lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # shellcheck is preinstalled on GitHub's ubuntu runners; shfmt is not, so install
      # the pinned official binary (matching the version used locally).
      - name: Install shfmt
        env:
          SHFMT_VERSION: v3.13.1
        run: |
          curl -sSfL "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64" \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt
          shfmt --version
          shellcheck --version

      # `shfmt -f .` finds shell files by shebang/extension, so the gate auto-covers any
      # future script with no hard-coded list to maintain. A non-empty format diff or a
      # shellcheck error-level finding fails the job.
      - name: shfmt (format)
        run: shfmt -d -i 2 -ci $(shfmt -f .)

      - name: shellcheck (correctness)
        run: shellcheck $(shfmt -f .)
