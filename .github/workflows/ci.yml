name: CI

# Test + build gate. Runs the same checks as the local pre-merge gate
# (npm test && npm run build) so they are enforced by GitHub, not just locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Build before test: the server's secure-header test exercises GET / which serves
      # the built client (client/dist). Without a prior build the SPA fallback errors and
      # the CSP assertion fails — see reviews/backlog.md.
      - name: Build
        run: npm run build

      - name: Test
        run: npm test
