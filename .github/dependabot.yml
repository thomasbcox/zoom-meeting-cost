version: 2
updates:
  # npm dependencies — root + each workspace.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: npm
    directory: "/client"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: "/server"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  # Keep GitHub Actions (e.g. CodeQL) versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
