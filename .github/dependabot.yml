version: 2
updates:
  # npm — one entry for the workspace root (owns the workspace manifests + root lockfile).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Breaking MAJOR upgrades for the runtime frameworks and the build toolchain are driven
    # deliberately (see dev-docs/dependency-review.md), not auto-proposed. Minor/patch and
    # security updates for these still flow.
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
    groups:
      # Group dev-dependency minor/patch updates into one PR. Majors are excluded so a patch
      # can never drag a major (e.g. Vite 8) along — majors are reviewed individually.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
  # Group all GitHub Actions updates into a single weekly PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
